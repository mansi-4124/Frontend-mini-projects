<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- SCREEN 1 : Start Screen-->
    <div id="start-screen" class="screen">
      <h1>Quiz App</h1>
      <p class="subtitle">Test your knowledge</p>
      <form id="quiz-setup-form">
        <div class="form-group">
          <label for="player-name">Player Name: </label>
          <input type="text" id="player-name" placeholder="Enter your name" />
        </div>
        <div class="form-group">
          <label for="category">Select Category: </label>
          <select id="category">
            <option value="9">General Knowledge</option>
            <option value="21">Sports</option>
            <option value="23">History</option>
            <option value="27">Animals</option>
          </select>
        </div>

        <div class="form-group">
          <label for="difficulty">Select Difficulty: </label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Number of Questions: </label>
          <select id="amount">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
          </select>
        </div>
        <button id="start-btn">Start Quiz</button>
      </form>
    </div>

    <!-- SCREEN 2 : Question Screen-->
    <div id="question-screen" class="screen hidden">
      <div id="quiz-header">
        <span id="question-counter">Question 1/10</span>
        <span id="timer">15</span>
      </div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="score-display">Score: <span id="score">0</span></div>
      <h2 id="question-text">Question will appear here</h2>
      <div id="answers-container">
        <button class="answer-btn">Answer A</button>
        <button class="answer-btn">Answer B</button>
        <button class="answer-btn">Answer C</button>
        <button class="answer-btn">Answer D</button>
      </div>
    </div>

    <!-- SCREEN 3 : Loading Screen-->
    <div id="loading-screen" class="screen hidden">
      <div id="spinner"></div>
      <p>Loading questions...</p>
    </div>

    <!-- SCREEN 4 : Results Screen-->
    <div id="results-screen" class="screen hidden">
      <h2>Quiz Completed!</h2>
      <p class="subtitle">
        Here's how you did, <span id="player-name-display">Player</span>!
      </p>
      <div id="results-summary">
        <div class="result-stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="final-score">0 / 10</span>
        </div>
        <div class="result-stat">
          <span class="stat-label">Correct</span>
          <span class="stat-value" id="correct-count">0</span>
        </div>
        <div class="result-stat">
          <span class="stat-label">Wrong</span>
          <span class="stat-value" id="wrong-count">0</span>
        </div>
        <div class="result-stat">
          <span class="stat-label">Time taken</span>
          <span class="stat-value" id="time-taken">0s</span>
        </div>
      </div>
      <p class="highscore-message" id="highscore-message" hidden="true">
        It's your highscore!!🎉
      </p>
      <div id="leaderboard-container">
        <h3>Leaderboard</h3>
        <ul id="leaderboard-list"></ul>
      </div>
      <canvas
        id="share-canvas"
        width="600"
        height="400"
        style="display: none"
      ></canvas>
      <button id="share-btn">Share My Score!</button>
      <button id="play-again-btn">Play Again</button>
    </div>
    <script src="js/api.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
